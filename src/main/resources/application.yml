server:
  port: 8082

spring:
  application:
    name: review-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/reviews
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

services:
  moderationService: ${MODERATION_SERVICE_URL:http://localhost:8083}/api/v1/moderation
  userService: ${USER_SERVICE_URL:http://localhost:8084}/api/v1/users
  rppsService: ${RPPS_SERVICE_URL:http://localhost:8081}/api/v1/practitioners